name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: test
    runs-on: ubuntu-latest

    env:
      GEMINI_API_KEY: test-key-not-real
      EXPORT_TOKEN: test-export-token
      GOOGLE_CALENDAR_ID: test@group.calendar.google.com
      GOOGLE_CREDENTIALS_JSON: '{"type":"service_account","project_id":"test","private_key_id":"x","private_key":"","client_email":"test@test.iam.gserviceaccount.com","client_id":"","auth_uri":"","token_uri":"","auth_provider_x509_cert_url":"","client_x509_cert_url":""}'

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tests
        # test_booking.py is back: create_calendar_event and _get_busy_times
        # are now properly mocked, so no live credentials are needed.
        run: pytest tests/test_scorer.py tests/test_agent_stages.py tests/test_booking.py -v --tb=short
