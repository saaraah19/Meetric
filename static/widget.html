<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Meetric — Chat Widget Demo</title>
<style>
    /* ───────────────────────────────────────────────────────────────
       THEME TOKENS
       WHAT: Every color/radius/size the widget uses lives here.
       WHY:  A business owner (or you, per-client) can re-skin this
             whole widget by editing these few lines — no need to
             hunt through every rule below.
       ─────────────────────────────────────────────────────────────── */
    :root {
        --cwa-accent: #146C63;          /* primary brand color (buttons, user bubbles) */
        --cwa-accent-hover: #0F5650;
        --cwa-accent-soft: #E4F1EF;     /* tint of accent, used for focus rings */
        --cwa-ink: #211F1C;             /* main text color (warm near-black) */
        --cwa-ink-muted: #6B6660;
        --cwa-surface: #FFFFFF;         /* chat panel background */
        --cwa-bot-bubble: #F2EEE7;      /* warm light gray for bot messages */
        --cwa-border: #E7E2D8;
        --cwa-error-bg: #FBEAE8;
        --cwa-error-border: #E3A6A0;
        --cwa-online: #2FB67C;
        --cwa-radius-lg: 18px;
        --cwa-radius-md: 12px;
        --cwa-font: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    }

    /* Reset just enough to keep this widget visually isolated from
       whatever stylesheet already exists on the host page. */
    #chat-widget-root, #chat-widget-root * {
        box-sizing: border-box;
        font-family: var(--cwa-font);
    }

    /* ─── Floating launcher ─────────────────────────────────────── */
    #chat-widget-button {
        position: fixed;
        bottom: calc(20px + env(safe-area-inset-bottom, 0px));
        right: 20px;
        width: 58px;
        height: 58px;
        border-radius: var(--cwa-radius-lg);
        background: var(--cwa-accent);
        color: #fff;
        border: none;
        cursor: pointer;
        box-shadow: 0 6px 20px rgba(20, 108, 99, 0.35);
        z-index: 10000;
        display: flex;
        align-items: center;
        justify-content: center;
        transition: transform 0.15s ease, background 0.15s ease;
    }
    #chat-widget-button:hover { transform: translateY(-2px); background: var(--cwa-accent-hover); }
    #chat-widget-button:focus-visible {
        outline: 3px solid var(--cwa-accent-soft);
        outline-offset: 3px;
    }
    #chat-widget-button svg { width: 26px; height: 26px; }

    /* "We're online" dot — a small, true detail: this bot responds
       instantly, so the launcher should visibly say so. */
    #chat-widget-status-dot {
        position: absolute;
        top: -2px;
        right: -2px;
        width: 14px;
        height: 14px;
        border-radius: 50%;
        background: var(--cwa-online);
        border: 2px solid var(--cwa-surface);
        animation: cwa-pulse 2.2s infinite;
    }
    @keyframes cwa-pulse {
        0%   { box-shadow: 0 0 0 0 rgba(47, 182, 124, 0.55); }
        70%  { box-shadow: 0 0 0 7px rgba(47, 182, 124, 0); }
        100% { box-shadow: 0 0 0 0 rgba(47, 182, 124, 0); }
    }
    @media (prefers-reduced-motion: reduce) {
        #chat-widget-status-dot { animation: none; }
    }

    /* ─── Chat window ──────────────────────────────────────────── */
    #chat-widget-window {
        position: fixed;
        bottom: calc(88px + env(safe-area-inset-bottom, 0px));
        right: 20px;
        width: min(380px, calc(100vw - 32px));
        height: min(560px, calc(100vh - 120px));
        background: var(--cwa-surface);
        border-radius: var(--cwa-radius-lg);
        box-shadow: 0 16px 40px rgba(0, 0, 0, 0.18);
        z-index: 9999;
        display: flex;
        flex-direction: column;
        overflow: hidden;
        border: 1px solid var(--cwa-border);
        visibility: hidden;
        opacity: 0;
        transform: translateY(10px) scale(0.98);
        transition: opacity 0.16s ease, transform 0.16s ease, visibility 0s linear 0.16s;
        pointer-events: none;
    }
    @supports (height: 100dvh) {
        #chat-widget-window { height: min(560px, calc(100dvh - 120px)); }
    }
    #chat-widget-window.open {
        visibility: visible;
        opacity: 1;
        transform: none;
        pointer-events: auto;
        transition: opacity 0.16s ease, transform 0.16s ease;
    }
    @media (prefers-reduced-motion: reduce) {
        #chat-widget-window { transition: opacity 0.01s linear; }
    }
    @media (max-width: 480px) {
        #chat-widget-window {
            left: 16px;
            right: 16px;
            width: auto;
            height: min(72vh, 560px);
        }
        @supports (height: 100dvh) {
            #chat-widget-window { height: min(72dvh, 560px); }
        }
    }

    /* ─── Header ───────────────────────────────────────────────── */
    #chat-widget-header {
        background: var(--cwa-accent);
        color: #fff;
        padding: 14px 16px;
        display: flex;
        justify-content: space-between;
        align-items: center;
        flex-shrink: 0;
    }
    #chat-widget-header-title {
        display: flex;
        align-items: center;
        gap: 8px;
        font-weight: 600;
        font-size: 15px;
        letter-spacing: 0.2px;
    }
    #chat-widget-header-title .cwa-online-text {
        font-size: 11px;
        font-weight: 400;
        opacity: 0.85;
        display: block;
        letter-spacing: 0.3px;
    }
    #chat-widget-close {
        background: none;
        border: none;
        color: #fff;
        cursor: pointer;
        padding: 6px;
        border-radius: 8px;
        display: flex;
    }
    #chat-widget-close:hover { background: rgba(255, 255, 255, 0.15); }
    #chat-widget-close:focus-visible { outline: 2px solid #fff; outline-offset: 1px; }
    #chat-widget-close svg { width: 18px; height: 18px; }

    /* ─── Messages area ────────────────────────────────────────── */
    #chat-widget-messages {
        flex: 1;
        padding: 14px 16px;
        overflow-y: auto;
        background: var(--cwa-surface);
        display: flex;
        flex-direction: column;
        gap: 10px;
        min-height: 0;
    }
    .chat-msg {
        max-width: 82%;
        padding: 9px 13px;
        border-radius: var(--cwa-radius-md);
        font-size: 14px;
        line-height: 1.5;
        word-wrap: break-word;
        white-space: pre-wrap;
    }
    .chat-msg.user {
        background: var(--cwa-accent);
        color: #fff;
        align-self: flex-end;
        border-bottom-right-radius: 4px;
    }
    .chat-msg.bot {
        background: var(--cwa-bot-bubble);
        color: var(--cwa-ink);
        align-self: flex-start;
        border-bottom-left-radius: 4px;
    }
    .chat-msg.error {
        background: var(--cwa-error-bg);
        border: 1px solid var(--cwa-error-border);
        color: var(--cwa-ink);
        align-self: flex-start;
        font-size: 13px;
    }
    .chat-msg.system {
        text-align: center;
        color: var(--cwa-ink-muted);
        font-size: 12px;
        align-self: center;
        max-width: 100%;
    }

    /* ─── Input area ───────────────────────────────────────────── */
    #chat-widget-input-area {
        display: flex;
        padding: 10px 12px;
        gap: 8px;
        border-top: 1px solid var(--cwa-border);
        background: var(--cwa-surface);
        flex-shrink: 0;
        padding-bottom: calc(10px + env(safe-area-inset-bottom, 0px));
    }
    #chat-widget-input {
        flex: 1;
        padding: 10px 13px;
        border: 1px solid var(--cwa-border);
        border-radius: var(--cwa-radius-md);
        font-size: 14px;
        outline: none;
        color: var(--cwa-ink);
        background: var(--cwa-surface);
    }
    #chat-widget-input:focus-visible {
        border-color: var(--cwa-accent);
        box-shadow: 0 0 0 3px var(--cwa-accent-soft);
    }
    #chat-widget-send {
        width: 40px;
        height: 40px;
        flex-shrink: 0;
        background: var(--cwa-accent);
        color: #fff;
        border: none;
        border-radius: var(--cwa-radius-md);
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        transition: background 0.15s ease;
    }
    #chat-widget-send:hover:not(:disabled) { background: var(--cwa-accent-hover); }
    #chat-widget-send:focus-visible { outline: 2px solid var(--cwa-accent); outline-offset: 2px; }
    #chat-widget-send:disabled { background: #C9C4BA; cursor: not-allowed; }
    #chat-widget-send svg { width: 18px; height: 18px; }

    /* ─── Typing indicator ─────────────────────────────────────── */
    .chat-typing {
        align-self: flex-start;
        display: flex;
        gap: 4px;
        padding: 10px 13px;
        background: var(--cwa-bot-bubble);
        border-radius: var(--cwa-radius-md);
        border-bottom-left-radius: 4px;
    }
    .chat-typing span {
        width: 6px;
        height: 6px;
        border-radius: 50%;
        background: var(--cwa-ink-muted);
        animation: cwa-bounce 1.2s infinite ease-in-out;
    }
    .chat-typing span:nth-child(2) { animation-delay: 0.15s; }
    .chat-typing span:nth-child(3) { animation-delay: 0.3s; }
    @keyframes cwa-bounce {
        0%, 80%, 100% { transform: translateY(0); opacity: 0.5; }
        40% { transform: translateY(-4px); opacity: 1; }
    }
    @media (prefers-reduced-motion: reduce) {
        .chat-typing span { animation: none; opacity: 1; }
    }

    /* ─── Demo backdrop (only relevant on the /widget demo page) ── */
    body {
        margin: 0;
        min-height: 100vh;
        background: #080D1A;
        background-image:
            linear-gradient(rgba(0,194,255,0.04) 1px, transparent 1px),
            linear-gradient(90deg, rgba(0,194,255,0.04) 1px, transparent 1px);
        background-size: 48px 48px;
    }
    #cwa-backdrop {
        position: fixed;
        inset: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 16px;
        padding: 24px;
        pointer-events: none;
        z-index: 0;
    }
    .cwa-backdrop-badge {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        padding: 6px 14px;
        border-radius: 999px;
        border: 1px solid rgba(0,194,255,0.2);
        background: rgba(0,194,255,0.07);
        font-size: 0.72rem;
        font-weight: 600;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        color: #00C2FF;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    }
    .cwa-backdrop-badge::before {
        content: '';
        width: 6px;
        height: 6px;
        border-radius: 50%;
        background: #00C2FF;
        animation: cwa-dot-pulse 2s infinite ease-in-out;
    }
    @keyframes cwa-dot-pulse {
        0%, 100% { opacity: 1; transform: scale(1); }
        50%       { opacity: 0.4; transform: scale(0.8); }
    }
    .cwa-backdrop-title {
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        font-size: clamp(1.8rem, 4vw, 2.8rem);
        font-weight: 700;
        letter-spacing: -0.03em;
        color: #F0F6FF;
        text-align: center;
        margin: 0;
    }
    .cwa-backdrop-title span { color: #00C2FF; }
    .cwa-backdrop-sub {
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        font-size: 1rem;
        color: #6B7FA3;
        text-align: center;
        max-width: 400px;
        line-height: 1.6;
        margin: 0;
    }
    .cwa-backdrop-arrow {
        display: flex;
        align-items: center;
        gap: 10px;
        margin-top: 12px;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        font-size: 0.85rem;
        color: #6B7FA3;
    }
    .cwa-backdrop-arrow svg {
        animation: cwa-bounce-right 1.6s infinite ease-in-out;
    }
    @keyframes cwa-bounce-right {
        0%, 100% { transform: translate(0, 0); }
        50%       { transform: translate(5px, 5px); }
    }
    @media (prefers-reduced-motion: reduce) {
        .cwa-backdrop-arrow svg { animation: none; }
        .cwa-backdrop-badge::before { animation: none; }
    }
    /* Fade out the backdrop text once the chat is open */
    body.chat-is-open #cwa-backdrop {
        opacity: 0.18;
        transition: opacity 0.4s ease;
    }

    /* Visually-hidden helper for screen-reader-only text */
    .cwa-sr-only {
        position: absolute;
        width: 1px; height: 1px;
        overflow: hidden;
        clip: rect(0 0 0 0);
        white-space: nowrap;
    }

    /* ─── Onboarding hint bubble ───────────────────────────────── */
    /* Appears once per session to direct the user's eye to the button.
       Positioned directly above the launcher, with a caret pointing down. */
    #cwa-hint {
        position: fixed;
        bottom: calc(88px + env(safe-area-inset-bottom, 0px));
        right: 14px;
        background: #fff;
        border: 1px solid var(--cwa-border);
        border-radius: 12px;
        padding: 10px 14px;
        font-family: var(--cwa-font);
        font-size: 13.5px;
        color: var(--cwa-ink);
        box-shadow: 0 6px 24px rgba(0,0,0,0.11);
        z-index: 10001;
        white-space: nowrap;
        display: flex;
        align-items: center;
        gap: 7px;
        cursor: pointer;
        user-select: none;
        transform-origin: bottom right;
        animation: cwa-hint-in 0.3s cubic-bezier(0.22, 1, 0.36, 1) both;
    }
    /* Caret pointing down-right toward the button */
    #cwa-hint::after {
        content: '';
        position: absolute;
        bottom: -7px;
        right: 26px;
        border-left: 7px solid transparent;
        border-right: 7px solid transparent;
        border-top: 7px solid #fff;
        filter: drop-shadow(0 1px 0 rgba(0,0,0,0.08));
    }
    #cwa-hint.cwa-hint-out {
        animation: cwa-hint-out 0.22s ease forwards;
    }
    @keyframes cwa-hint-in {
        from { opacity: 0; transform: translateY(8px) scale(0.95); }
        to   { opacity: 1; transform: translateY(0) scale(1); }
    }
    @keyframes cwa-hint-out {
        from { opacity: 1; transform: translateY(0) scale(1); }
        to   { opacity: 0; transform: translateY(5px) scale(0.97); }
    }
    @media (prefers-reduced-motion: reduce) {
        #cwa-hint, #cwa-hint.cwa-hint-out { animation: none; }
    }
    /* On mobile: align the bubble with the left edge of the button */
    @media (max-width: 480px) {
        #cwa-hint { right: 16px; }
    }
</style>
</head>
<body>

<!-- ─── DEMO BACKDROP ────────────────────────────────────────── -->
<div id="cwa-backdrop" aria-hidden="true">
    <span class="cwa-backdrop-badge">Live demo</span>
    <h1 class="cwa-backdrop-title">Your website's first<br><span>AI assistant</span>.</h1>
    <p class="cwa-backdrop-sub">
        Qualifies inbound leads in English, French, and Arabic —<br>scores them hot, warm, or cold, and books a call automatically.
    </p>
    <div class="cwa-backdrop-arrow">
        Chat is open — say hello
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#6B7FA3" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <line x1="5" y1="5" x2="19" y2="19"/><polyline points="19 9 19 19 9 19"/>
        </svg>
    </div>
</div>

<div id="chat-widget-root">

    <!-- ─── FLOATING LAUNCHER ───────────────────────────────────── -->
    <button id="chat-widget-button" aria-expanded="false" aria-controls="chat-widget-window" aria-label="Open chat">
        <span id="chat-widget-status-dot" aria-hidden="true"></span>
        <svg id="cwa-icon-chat" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z"/>
        </svg>
        <svg id="cwa-icon-close-launcher" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" style="display:none" aria-hidden="true">
            <path d="M6 6l12 12M18 6L6 18"/>
        </svg>
    </button>

    <!-- ─── CHAT WINDOW ─────────────────────────────────────────── -->
    <div id="chat-widget-window" role="dialog" aria-modal="true" aria-label="Chat with us">
        <div id="chat-widget-header">
            <div id="chat-widget-header-title">
                <span>
                    Chat with us
                    <span class="cwa-online-text">Usually replies in a few seconds</span>
                </span>
            </div>
            <button id="chat-widget-close" aria-label="Close chat">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" aria-hidden="true">
                    <path d="M6 6l12 12M18 6L6 18"/>
                </svg>
            </button>
        </div>

        <div id="chat-widget-messages" role="log" aria-live="polite" aria-relevant="additions"></div>

        <div id="chat-widget-input-area">
            <label for="chat-widget-input" class="cwa-sr-only">Type your message</label>
            <input
                id="chat-widget-input"
                type="text"
                placeholder="Type a message..."
                maxlength="500"
                autocomplete="off"
                inputmode="text"
                enterkeyhint="send"
            />
            <button id="chat-widget-send" aria-label="Send message" disabled>
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                    <path d="M22 2L11 13M22 2l-7 20-4-9-9-4 20-7z"/>
                </svg>
            </button>
        </div>
    </div>

</div>

<script>
(function () {
    'use strict';

    // ─── CONFIG ────────────────────────────────────────────────────
    const API_BASE = '{{API_BASE}}' || window.location.origin;
    const MAX_STORED_MESSAGES = 50;   // cap how much transcript we keep client-side

    // ─── SESSION ID ────────────────────────────────────────────────
    // WHAT: A stable ID for this visitor's conversation.
    // WHY: crypto.randomUUID() is unguessable; Math.random() strings
    //      are not, and this ID is tied to a record containing the
    //      visitor's contact info, so it's worth doing properly.
    //      We still fall back for very old browsers / non-HTTPS pages
    //      where crypto.randomUUID isn't available.
    function makeSessionId() {
        if (window.crypto && typeof window.crypto.randomUUID === 'function') {
            return 'session_' + window.crypto.randomUUID();
        }
        return 'session_' + Math.random().toString(36).slice(2) + Date.now().toString(36);
    }

    // WHY sessionStorage, not localStorage:
    // localStorage persists forever — the same session_id comes back even after
    // closing the browser, which means every return visit picks up a stale
    // conversation. sessionStorage is scoped to the tab: a page refresh keeps
    // the same session (so a lead who hits F5 mid-conversation doesn't lose
    // anything), but opening a new tab or closing and reopening the browser
    // starts a clean session. That matches the intended behaviour ("browser
    // memory for this visit") and means demo recordings always start fresh
    // by just opening a new tab.
    let sessionId = sessionStorage.getItem('chat_session_id');
    if (!sessionId) {
        sessionId = makeSessionId();
        sessionStorage.setItem('chat_session_id', sessionId);
    }

    const STORAGE_KEY = 'chat_transcript_' + sessionId;

    // ─── STATE ─────────────────────────────────────────────────────
    let isOpen = false;
    let isProcessing = false;

    // ─── DOM ───────────────────────────────────────────────────────
    const button = document.getElementById('chat-widget-button');
    const statusDot = document.getElementById('chat-widget-status-dot');
    const iconChat = document.getElementById('cwa-icon-chat');
    const iconCloseLauncher = document.getElementById('cwa-icon-close-launcher');
    const windowEl = document.getElementById('chat-widget-window');
    const closeBtn = document.getElementById('chat-widget-close');
    const messagesEl = document.getElementById('chat-widget-messages');
    const inputEl = document.getElementById('chat-widget-input');
    const sendBtn = document.getElementById('chat-widget-send');

    // ─── TRANSCRIPT PERSISTENCE ────────────────────────────────────
    // WHAT: Keep a copy of what's been shown so a page reload doesn't
    //       wipe the visible conversation (the backend already
    //       remembers the session — the UI should too).
    function loadTranscript() {
        try {
            const raw = sessionStorage.getItem(STORAGE_KEY);
            return raw ? JSON.parse(raw) : [];
        } catch (e) {
            return [];
        }
    }
    function saveTranscript(list) {
        try {
            sessionStorage.setItem(STORAGE_KEY, JSON.stringify(list.slice(-MAX_STORED_MESSAGES)));
        } catch (e) {
            // Storage full or unavailable — the chat still works, it just
            // won't survive a reload. Not worth interrupting the user for.
        }
    }
    let transcript = loadTranscript();

    // ─── RENDER A MESSAGE BUBBLE ───────────────────────────────────
    function renderMessage(type, content) {
        const div = document.createElement('div');
        div.className = 'chat-msg ' + type;
        div.textContent = content;
        messagesEl.appendChild(div);
        messagesEl.scrollTop = messagesEl.scrollHeight;
    }

    // ─── ADD + PERSIST A MESSAGE ───────────────────────────────────
    function addMessage(type, content, persist) {
        renderMessage(type, content);
        if (persist !== false) {
            transcript.push({ type: type, content: content });
            saveTranscript(transcript);
        }
    }

    // ─── TYPING INDICATOR ──────────────────────────────────────────
    function showTyping() {
        const div = document.createElement('div');
        div.className = 'chat-typing';
        div.id = 'typing-indicator';
        div.setAttribute('aria-label', 'Assistant is typing');
        div.innerHTML = '<span></span><span></span><span></span>';
        messagesEl.appendChild(div);
        messagesEl.scrollTop = messagesEl.scrollHeight;
    }
    function hideTyping() {
        const el = document.getElementById('typing-indicator');
        if (el) el.remove();
    }

    // ─── OPEN / CLOSE ──────────────────────────────────────────────
    function openWindow() {
        isOpen = true;
        windowEl.classList.add('open');
        document.body.classList.add('chat-is-open');
        button.setAttribute('aria-expanded', 'true');
        button.setAttribute('aria-label', 'Close chat');
        iconChat.style.display = 'none';
        iconCloseLauncher.style.display = '';

        if (transcript.length === 0) {
            const greeting = "Hello! I'm here to help. Tell me what you need, and I'll connect you with the right person.";
            addMessage('bot', greeting);
        } else if (messagesEl.children.length === 0) {
            // Restore the saved transcript visually (e.g. after a page reload).
            transcript.forEach(function (m) { renderMessage(m.type, m.content); });
        }
        inputEl.focus();
    }
    function closeWindow() {
        isOpen = false;
        windowEl.classList.remove('open');
        document.body.classList.remove('chat-is-open');
        button.setAttribute('aria-expanded', 'false');
        button.setAttribute('aria-label', 'Open chat');
        iconChat.style.display = '';
        iconCloseLauncher.style.display = 'none';
        button.focus();
    }
    function toggleWindow() {
        isOpen ? closeWindow() : openWindow();
    }

    button.addEventListener('click', toggleWindow);
    closeBtn.addEventListener('click', closeWindow);
    document.addEventListener('keydown', function (e) {
        if (e.key === 'Escape' && isOpen) closeWindow();
    });

    // ─── SEND / RECEIVE ────────────────────────────────────────────
    inputEl.addEventListener('input', function () {
        sendBtn.disabled = inputEl.value.trim().length === 0 || isProcessing;
    });

    async function sendMessage() {
        const message = inputEl.value.trim();
        if (!message || isProcessing) return;

        isProcessing = true;
        sendBtn.disabled = true;
        inputEl.disabled = true;

        addMessage('user', message);
        inputEl.value = '';
        showTyping();

        try {
            const response = await fetch(API_BASE + '/chat', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ session_id: sessionId, message: message })
            });

            const data = await response.json();
            hideTyping();

            if (response.ok) {
                addMessage('bot', data.reply);
            } else {
                addMessage('error', "Message didn't send. Please try again in a moment.");
            }
        } catch (error) {
            hideTyping();
            addMessage('error', "Couldn't reach the server. Check your connection and try again.");
        } finally {
            isProcessing = false;
            inputEl.disabled = false;
            sendBtn.disabled = inputEl.value.trim().length === 0;
            inputEl.focus();
        }
    }

    sendBtn.addEventListener('click', sendMessage);
    inputEl.addEventListener('keydown', function (e) {
        if (e.key === 'Enter') {
            e.preventDefault();
            sendMessage();
        }
    });

    // ─── AUTO-OPEN on demo page load ───────────────────────────────
    // The /widget URL is a live demo — open the chat immediately so
    // visitors never see a blank page wondering what to do.
    // We mark the hint as seen so it doesn't pop up over an open chat.
    sessionStorage.setItem('cwa_hint_seen', '1');
    setTimeout(openWindow, 650);

    // ─── ONBOARDING HINT ───────────────────────────────────────────
    // Show a "chat with us" bubble above the launcher once per session.
    // Dismissed on click, on Escape, when the chat opens, or after 6 s.
    (function () {
        const HINT_KEY = 'cwa_hint_seen';
        if (sessionStorage.getItem(HINT_KEY)) return;

        let hintEl = null;
        let hintTimer = null;

        function removeHint() {
            if (!hintEl) return;
            hintEl.classList.add('cwa-hint-out');
            setTimeout(function () { hintEl && hintEl.remove(); hintEl = null; }, 230);
            clearTimeout(hintTimer);
        }

        function showHint() {
            sessionStorage.setItem(HINT_KEY, '1');
            hintEl = document.createElement('div');
            hintEl.id = 'cwa-hint';
            hintEl.setAttribute('role', 'status');
            hintEl.setAttribute('aria-label', 'Chat with us');
            hintEl.innerHTML = '<span aria-hidden="true">👋</span><span>Chat with us!</span>';
            document.getElementById('chat-widget-root').appendChild(hintEl);

            // Dismiss on direct click of the hint bubble
            hintEl.addEventListener('click', function () {
                removeHint();
                openWindow();
            });

            // Auto-dismiss after 6 s
            hintTimer = setTimeout(removeHint, 6000);
        }

        // Reveal after a short delay so the page feels settled first
        setTimeout(showHint, 1400);

        // Dismiss immediately if the user opens the chat themselves
        button.addEventListener('click', removeHint, { once: true });
        document.addEventListener('keydown', function (e) {
            if (e.key === 'Escape') removeHint();
        });
    }());
})();
</script>

</body>
</html>
